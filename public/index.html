<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infogain Support</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background:
          radial-gradient(900px 600px at 10% 10%, rgba(255, 170, 220, 0.28), transparent 55%),
          radial-gradient(900px 600px at 90% 30%, rgba(100, 120, 255, 0.30), transparent 55%),
          radial-gradient(900px 600px at 40% 95%, rgba(140, 90, 255, 0.24), transparent 55%),
          #090a0f;
      }

      .card {
        width: min(720px, 92vw);
        height: min(820px, 86vh);
        border-radius: 24px;
        background: rgba(18, 24, 32, 0.88);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.06);
        padding: 44px 44px 28px;
        position: relative;
        overflow: hidden;
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .brand-row {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .logo {
        width: 48px;
        height: 18px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }

      .logo span {
        background: rgba(255, 255, 255, 0.92);
        border-radius: 2px;
      }

      .title {
        font-size: 34px;
        letter-spacing: 0.22em;
        font-weight: 700;
        margin: 0;
      }

      .subtitle {
        margin: 0;
        font-size: 18px;
        letter-spacing: 0.08em;
        color: rgba(255, 255, 255, 0.55);
        font-weight: 600;
      }

      .spacer {
        height: 1px;
        background: rgba(255, 255, 255, 0.06);
        margin: 22px 0 0;
      }

      .content {
        position: absolute;
        inset: 170px 44px 28px;
        display: grid;
        grid-template-rows: 1fr auto auto;
        gap: 14px;
      }

      .response {
        border-radius: 18px;
        padding: 18px 18px;
        background: rgba(10, 12, 16, 0.32);
        border: 1px solid rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.86);
        overflow: auto;
        white-space: pre-wrap;
        line-height: 1.5;
        font-size: 15px;
      }

      .hint {
        color: rgba(255, 255, 255, 0.45);
        font-size: 13px;
        margin: 0;
      }

      form {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 14px;
        align-items: center;
      }

      .input {
        width: 100%;
        border-radius: 18px;
        padding: 18px 18px;
        background: rgba(10, 12, 16, 0.18);
        border: 1px solid rgba(110, 180, 255, 0.28);
        color: rgba(255, 255, 255, 0.92);
        outline: none;
        font-size: 16px;
      }

      .input::placeholder {
        color: rgba(255, 255, 255, 0.35);
      }

      .btn {
        border-radius: 18px;
        padding: 18px 18px;
        min-width: 64px;
        background: rgba(10, 12, 16, 0.18);
        border: 1px solid rgba(110, 180, 255, 0.28);
        color: rgba(255, 255, 255, 0.92);
        font-size: 16px;
        cursor: pointer;
      }

      .btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      @media (max-height: 720px) {
        .content { inset: 150px 28px 24px; }
        .card { padding: 34px 28px 24px; }
      }
    </style>
  </head>

  <body>
    <main class="card">
      <header class="brand">
        <div class="brand-row">
          <div class="logo" aria-hidden="true">
            <span></span><span></span>
          </div>
          <h1 class="title">Infogain AI Query</h1>
        </div>
        <p class="subtitle">SUPPORT</p>
        <div class="spacer"></div>
      </header>

      <section class="content">
        <div id="response" class="response"></div>
        <p class="hint">Type a question and press Enter.</p>

        <form id="askForm" autocomplete="off">
          <input
            id="question"
            class="input"
            type="text"
            placeholder="Ask a question…"
            required
          />
          <button id="sendBtn" class="btn" type="submit" aria-label="Send">
            &#9654;
          </button>
        </form>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
